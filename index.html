<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#020617;}

.car-card{
background:linear-gradient(145deg,#0f172a,#0b1220);
border:2px solid gold;
border-radius:20px;
padding:20px;
margin-bottom:30px;
}

.payment-card{
background:#111827;
border:2px solid #22c55e;
border-radius:20px;
padding:25px;
margin-top:40px;
box-shadow:0 0 30px #22c55e;
}

.slot-btn{
background:#374151;
padding:14px;
border-radius:10px;
font-size:18px;
}
.slot-btn:hover{
background:#facc15;
color:black;
}

.full{
background:black;
color:#22c55e;
padding:10px 20px;
border-radius:12px;
box-shadow:0 0 20px red;
font-weight:bold;
}

.list-card{
background:#374151;
padding:14px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete-btn{
color:red;
font-size:20px;
cursor:pointer;
margin-left:15px;
}

.admin-btn{
position:fixed;
top:10px;
right:15px;
background:gold;
color:black;
padding:8px 12px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
z-index:999;
}
</style>
</head>

<body class="text-white">

<div class="admin-btn" onclick="adminLogin()">管理員登入</div>

<div class="p-4 max-w-4xl mx-auto">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-6">
✨✨PkmFire車隊✨✨
</h1>

<div id="cars"></div>

<div class="mt-10 car-card">
<h2 class="text-yellow-400 font-bold text-xl mb-4">📋 已報名名單</h2>
<div id="list" class="space-y-4"></div>
</div>

<div id="paymentSection" class="payment-card">
<h2 class="text-2xl font-bold text-green-400 mb-4">✨付款銀行✨</h2>

<p class="mb-4 text-lg">
✅ 轉數快識別碼：<br>
<strong class="text-yellow-400 text-xl">128392362</strong>
</p>

<p class="mb-4 text-lg">
✅ 銀行：滙豐銀行<br>
✅ 戶口姓名：PkmFire Limited
</p>

<p class="text-red-400 font-bold text-lg">
⚠️ 付款完成後請截圖傳送至 64866544
</p>
</div>

</div>

<script>

const ADMIN_PASSWORD="$$1234Rmb";
let isAdmin=false;

const supabaseClient = supabase.createClient(
"https://mgcnadtcykoctdwwzpkm.supabase.co",
"sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

const events={

Car1:{
slots:7,
desc:`🛞Car1🛞
🎮-玩法
開一盒黃金禮盒混洗
大獎 黃金比卡超 x1
二獎 金球加配件 x1
五份參與獎 25周年白色卡包代拆（每人一包）
有機會開出生日比卡超、噴火龍
🔥7人成團
🔥每個位置$2140`
},

Car2:{
slots:10,
desc:`🛞Car2🛞
✨✨PSA10人車✨✨
🔥十人成團
🔥每個位置$458
🏆AR編號最大者獲得
✨25周年夢夢PSA10✨`
},

Car3:{
slots:10,
desc:`🛞Car3🛞
✨✨100deck原條爭奪戰✨✨
🔥十人成團
🔥用一盒M2A原膜組車
🔥每人一包M2A卡包鬥血量
如血量相同補發一包再鬥
🔥每個位置$850
🏆血量最大者獲得
✨100deck原條✨`
},

Car4:{
slots:6,
desc:`🛞Car4🛞
✨✨超級M2A混能車✨✨
🎮-玩法
六人加埋開出12張不同AR加5張MA加一張SAR/MUR（道具不計）先停車，唔係就繼續開到夠數為止❗️❗️
🔥6人成團
🔥每個位置$678（保底每人8包）`
},

Car5:{
slots:10,
desc:`🛞Car5🛞
✨✨100deck原條組隊✨✨
🔥十人成團
🔥每個位置$800`
}

};

function adminLogin(){
const pw=prompt("請輸入管理員密碼");
if(pw===ADMIN_PASSWORD){
isAdmin=true;
alert("✅ 已進入管理模式");
loadData();
}else{
alert("❌ 密碼錯誤");
}
}

async function register(car,pos){
const name=prompt("請輸入姓名");
const phone=prompt("請輸入電話");
if(!name||!phone) return;

await supabaseClient.from("registrations")
.insert([{name,phone,car,position:pos}]);

alert("✅ 報名成功！請完成付款");

loadData();

setTimeout(()=>{
document.getElementById("paymentSection")
.scrollIntoView({behavior:"smooth"});
},300);
}

async function deleteRegistration(id){
await supabaseClient.from("registrations")
.delete()
.eq("id",id);
loadData();
}

async function loadData(){

const {data}=await supabaseClient.from("registrations").select("*");
let registrations=data||[];

registrations.sort((a,b)=>{
let carA=Number((a.car||"").replace("Car",""))||0;
let carB=Number((b.car||"").replace("Car",""))||0;
if(carA!==carB) return carA-carB;
return (a.position||0)-(b.position||0);
});

const carsDiv=document.getElementById("cars");
const listDiv=document.getElementById("list");

carsDiv.innerHTML="";
listDiv.innerHTML="";

["Car1","Car2","Car3","Car4","Car5"].forEach(car=>{

const taken=registrations.filter(r=>r.car===car);
const remaining=events[car].slots-taken.length;

const card=document.createElement("div");
card.className="car-card";

card.innerHTML=`
<h2 class="text-yellow-400 text-2xl font-bold mb-3">${car}</h2>
<pre class="whitespace-pre-wrap text-gray-300 mb-4">${events[car].desc}</pre>
${remaining<=0?
`<div class="full">✅ 已滿團</div>`:
`<div class="text-green-400 font-bold mb-3">剩餘名額：${remaining}</div>`}
`;

const grid=document.createElement("div");
grid.className="grid grid-cols-5 gap-3 mt-4";

for(let i=1;i<=events[car].slots;i++){
const btn=document.createElement("button");
btn.innerText=i;

const isTaken=taken.some(r=>Number(r.position)===i);

if(isTaken){
btn.className="slot-btn bg-red-600 text-white cursor-not-allowed";
btn.disabled=true;
}else{
btn.className="slot-btn";
btn.onclick=()=>register(car,i);
}

grid.appendChild(btn);
}

card.appendChild(grid);
carsDiv.appendChild(card);

taken.forEach(r=>{
const item=document.createElement("div");
item.className="list-card";

const info=document.createElement("div");
info.innerHTML=`
${r.car} - ${r.position}號位<br>
${r.name} (${r.phone})
`;

item.appendChild(info);

if(isAdmin){
const del=document.createElement("div");
del.className="delete-btn";
del.innerText="✖";
del.onclick=()=>{
if(confirm("確定刪除？")){
deleteRegistration(r.id);
}
};
item.appendChild(del);
}

listDiv.appendChild(item);
});

});

}

loadData();

</script>
</body>
</html>

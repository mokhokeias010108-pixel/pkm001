function adminLogin(){
const pw=prompt("и«Ӣијёе…Ҙз®ЎзҗҶе“ЎеҜҶзўј");
if(pw===ADMIN_PASSWORD){
isAdmin=true;
alert("вң… з®ЎзҗҶжЁЎејҸ");

}
}

async function register(car,pos){
const name=prompt("и«Ӣијёе…Ҙе§“еҗҚ");
const phone=prompt("и«Ӣијёе…Ҙйӣ»и©ұ");
if(!name||!phone) return;

await supabaseClient.from("registrations")
.insert([{name,phone,car,position:pos}]);

loadData();
}

async function deleteRegistration(id){
if(!isAdmin) return;
await supabaseClient.from("registrations").delete().eq("id",id);
loadData();
}

async function loadData(){

const {data}=await supabaseClient.from("registrations").select("*");
let registrations=data||[];

/* жҺ’еәҸ */
registrations.sort((a,b)=>{
let carA=Number((a.car||"").replace("Car",""))||0;
let carB=Number((b.car||"").replace("Car",""))||0;
if(carA!==carB) return carA-carB;
return (a.position||0)-(b.position||0);
});

const carsDiv=document.getElementById("cars");
const list=document.getElementById("list");
carsDiv.innerHTML="";
list.innerHTML="";

/* дёҠж–№еҚЎзүҮ */
Object.keys(events).forEach(car=>{

const taken=registrations.filter(r=>r.car===car);
const remaining=events[car].slots-taken.length;

const card=document.createElement("div");
card.className="car-card";

card.innerHTML=`
<h2 class="text-yellow-400 text-2xl font-bold mb-3">${car}</h2>
<pre class="whitespace-pre-wrap text-gray-300 mb-4">${events[car].desc}</pre>
${remaining<=0?
`<div class="full">вң… е·Іж»ҝеңҳ</div>`:
`<div class="text-green-400 font-bold mb-3">еү©йӨҳеҗҚйЎҚпјҡ${remaining}</div>`}
`;

const grid=document.createElement("div");
grid.className="grid grid-cols-5 gap-3 mt-4";

for(let i=1;i<=events[car].slots;i++){

const btn=document.createElement("button");
btn.innerText=i;

const isTaken = taken.some(r => Number(r.position) === i);

if(isTaken){
btn.className="slot-btn bg-red-600 text-white cursor-not-allowed";
btn.disabled=true;
}else{
btn.className="slot-btn";
btn.onclick=()=>register(car,i);
}

grid.appendChild(btn);
}

card.appendChild(grid);
carsDiv.appendChild(card);
});

/* дёӢж–№еҗҚе–® */
let grouped={};
registrations.forEach(r=>{
if(!grouped[r.car]) grouped[r.car]=[];
grouped[r.car].push(r);
});

Object.keys(grouped).forEach(car=>{

const title=document.createElement("div");
title.className="text-yellow-400 font-bold mt-6";
title.innerText=car;
list.appendChild(title);

grouped[car].forEach(r=>{
const div=document.createElement("div");
div.className="list-card mt-2";

div.innerHTML=`
<div>
дҪҚзҪ® ${r.position} - ${r.name} - рҹ“һ ${r.phone}
</div>
${isAdmin?`<div class="delete-btn" onclick="deleteRegistration('${r.id}')">вқҢ</div>`:""}
`;

list.appendChild(div);
});
});

}

loadData();

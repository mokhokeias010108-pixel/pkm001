<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#020617;}
.car-card{
background:linear-gradient(145deg,#0f172a,#0b1220);
border:2px solid gold;
border-radius:20px;
padding:20px;
margin-bottom:30px;
}
.slot-btn{
background:#374151;
padding:14px;
border-radius:10px;
font-size:18px;
}
.slot-btn:hover{background:#facc15;color:black;}
.full{
background:black;
color:#22c55e;
padding:10px 20px;
border-radius:12px;
box-shadow:0 0 20px red;
font-weight:bold;
}
.list-card{
background:#374151;
padding:14px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}
.delete-btn{
color:red;
font-size:22px;
cursor:pointer;
}
.admin-btn{
position:fixed;
top:10px;
right:15px;
background:gold;
color:black;
padding:8px 12px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
.top-info{
background:#111827;
border:2px solid #facc15;
padding:20px;
border-radius:16px;
margin-bottom:30px;
white-space:pre-wrap;
}
</style>
</head>

<body class="text-white">

<div class="admin-btn" onclick="adminLogin()">管理員登入</div>

<div class="p-4 max-w-4xl mx-auto">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-6">
✨✨PkmFire車隊✨✨
</h1>

<!-- ✅ 新增直播 + 福利區 -->
<div class="top-info text-gray-200">

🔥 直播時間：5月29日 晚上10:00  
📹 直播平台：IG _pkmfire_

✨✨PkmFire車隊福利✨✨  

✨ 為回報大家支持增設激賞活動 ✨  
凡上車均可進入 PSA 卡抽獎活動  

⚠ 今日只限：
✅ PSA車  
✅ M2A混能車  

🏆 今期獎品：
打喊露比卡超 PSA10  

📌 每一車抽一個名額  
📌 滿10人即抽選  

</div>

<div id="cars"></div>

<div class="mt-10 car-card">
<h2 class="text-yellow-400 font-bold text-xl mb-4">📋 已報名名單</h2>
<div id="list" class="space-y-4"></div>
</div>

</div>

<script>

const ADMIN_PASSWORD="$$1234Rmb";
let isAdmin=false;

const supabaseClient = supabase.createClient(
"https://mgcnadtcykoctdwwzpkm.supabase.co",
"sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

/* 活動資料（不變） */
const events={
Car1:{slots:7,desc:`🛞Car1🛞
🔥-7人成團
🔥-$2140`},
Car2:{slots:10,desc:`🛞Car2🛞
🔥-10人成團
🔥-$300`},
Car3:{slots:10,desc:`🛞Car3🛞
🔥-10人成團
🔥-$350`},
Car4:{slots:6,desc:`Car4
🔥-6人成團
🔥-$668`}
};

function adminLogin(){
const pw=prompt("請輸入管理員密碼");
if(pw===ADMIN_PASSWORD){
isAdmin=true;
alert("✅ 已進入管理模式");
loadData();
}else{
alert("❌ 密碼錯誤");
}
}

async function register(car,pos){
const name=prompt("請輸入姓名");
const phone=prompt("請輸入電話");
if(!name||!phone) return;

await supabaseClient.from("registrations")
.insert([{name,phone,car,position:pos}]);

loadData();
}

async function deleteRegistration(id){
if(!isAdmin) return;
await supabaseClient.from("registrations").delete().eq("id",id);
loadData();
}

async function loadData(){

const {data}=await supabaseClient.from("registrations").select("*");
let registrations=data||[];

registrations.sort((a,b)=>{
let carA=Number((a.car||"").replace("Car",""))||0;
let carB=Number((b.car||"").replace("Car",""))||0;
if(carA!==carB) return carA-carB;
return (a.position||0)-(b.position||0);
});

const carsDiv=document.getElementById("cars");
const list=document.getElementById("list");
carsDiv.innerHTML="";
list.innerHTML="";

/* 上方卡片 */
Object.keys(events).forEach(car=>{

const taken=registrations.filter(r=>r.car===car);
const remaining=events[car].slots-taken.length;

const card=document.createElement("div");
card.className="car-card";

card.innerHTML=`
<h2 class="text-yellow-400 text-2xl font-bold mb-3">${car}</h2>
<pre class="whitespace-pre-wrap text-gray-300 mb-4">${events[car].desc}</pre>
${remaining<=0?
`<div class="full">✅ 已滿團</div>`:
`<div class="text-green-400 font-bold mb-3">剩餘名額：${remaining}</div>`}
`;

const grid=document.createElement("div");
grid.className="grid grid-cols-5 gap-3 mt-4";

for(let i=1;i<=events[car].slots;i++){

const btn=document.createElement("button");
btn.innerText=i;

const isTaken=taken.some(r=>Number(r.position)===i);

if(isTaken){
btn.className="slot-btn bg-red-600 text-white cursor-not-allowed";
btn.disabled=true;
}else{
btn.className="slot-btn";
btn.onclick=()=>register(car,i);
}

grid.appendChild(btn);
}

card.appendChild(grid);
carsDiv.appendChild(card);
});

/* 下方名單 */
let grouped={};
registrations.forEach(r=>{
if(!grouped[r.car]) grouped[r.car]=[];
grouped[r.car].push(r);
});

Object.keys(grouped).forEach(car=>{

const title=document.createElement("div");
title.className="text-yellow-400 font-bold mt-6";
title.innerText=car;
list.appendChild(title);

grouped[car].forEach(r=>{
const div=document.createElement("div");
div.className="list-card mt-2";

div.innerHTML=`
<div>
位置 ${r.position} - ${r.name} - 📞 ${r.phone}
</div>
${isAdmin?`<div class="delete-btn" onclick="deleteRegistration('${r.id}')">❌</div>`:""}
`;

list.appendChild(div);
});
});

}

loadData();

</script>
</body>
</html>

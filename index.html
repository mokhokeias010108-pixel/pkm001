<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#020617;}
.car-card{
background:linear-gradient(145deg,#0f172a,#0b1220);
border:2px solid gold;
border-radius:20px;
padding:20px;
margin-bottom:30px;
}
.slot-btn{
background:#374151;
padding:14px;
border-radius:10px;
font-size:18px;
}
.slot-btn:hover{background:#facc15;color:black;}
.full{
background:black;
color:#22c55e;
padding:10px 20px;
border-radius:12px;
box-shadow:0 0 20px red;
font-weight:bold;
}
.list-card{
background:#374151;
padding:14px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}
.delete-btn{
color:red;
font-size:22px;
cursor:pointer;
}
.admin-btn{
position:fixed;
top:10px;
right:15px;
background:gold;
color:black;
padding:8px 12px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
z-index:999;
}
.top-info{
background:#111827;
border:2px solid #facc15;
padding:20px;
border-radius:16px;
margin-bottom:30px;
white-space:pre-wrap;
}
</style>
</head>

<body class="text-white">

<div class="admin-btn" onclick="adminLogin()">管理員登入</div>

<div class="p-4 max-w-4xl mx-auto">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-6">
✨✨PkmFire車隊✨✨
</h1>

<div class="top-info text-gray-200">
——————————————
🎮報名連結🎮
🔥 直播時間：6月1日 晚上21:00 🔥
📹 直播平台：IG_pkmfire_
——————————————

✨PkmFire車隊福利✨
另外為回報大家支持增設激賞活動，
凡上車可進入 PSA 卡抽獎活動
（今日只限 PSA 車及 M2A 混能車參與）
今期獎品：打喊露比卡超 PSA10
每一車抽一個名額，滿10人抽選
</div>

<div id="cars"></div>

<div class="mt-10 car-card">
<h2 class="text-yellow-400 font-bold text-xl mb-4">📋 已報名名單</h2>
<div id="list" class="space-y-4"></div>
</div>

</div>

<script>

const ADMIN_PASSWORD="$$1234Rmb";
let isAdmin=false;

const supabaseClient = supabase.createClient(
"https://mgcnadtcykoctdwwzpkm.supabase.co",
"sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

/* ✅ 更新車隊資料（Car1不變，其餘更新） */
const events={

Car1:{
slots:7,
desc:`🛞Car1🛞
🎮玩法：
開一盒黃金禮盒混洗

🎁獎品：
🏆 黃金比卡超 x1
🥈 金球加配件 x1
🎉 25周年白卡包代拆 x5

🔥 7人成團
🔥 每個位置 $2140`
},

Car2:{
slots:10,
desc:`🛞Car2🛞
PokemonGo 超夢 074/071 PSA10

🎮玩法：
🔥 十人成團
🔥 用一盒 M5 原膜組車
🔥 每人 3 包 M5 卡包鬥所有卡總血量
如最大血量相同會補發一包 M2A 再鬥

🔥 每個位置 $460

🏆🏆 血量最大者獲得 🏆🏆
PokemonGo 超夢 074/071 PSA10`
},

Car3:{
slots:10,
desc:`🛞Car3🛞
比卡超 朱紫 PROMO 001/SV-P PSA10

🎮玩法：
🔥 十人成團
🔥 用一盒 M5 原膜組車
🔥 每人 3 包 M5 卡包鬥所有卡總血量
如最大血量相同會補發一包 M2A 再鬥

🔥 每個位置 $240

🏆🏆 血量最大者獲得 🏆🏆
比卡超 朱紫 PROMO 001/SV-P PSA10`
},

Car4:{
slots:6,
desc:`🛞Car4🛞
超級 M2A 混能車

🎮玩法：
六人合開
開出 12 張不同 AR + 5 張 MA + 1 張 SAR/MUR
（道具不計）
達標先停車，否則繼續開
默認走白卡

🔥 6人成團
🔥 每個位置 $668
保底每人 8 包`
}

};

function adminLogin(){
const pw=prompt("請輸入管理員密碼");
if(pw===ADMIN_PASSWORD){
isAdmin=true;
alert("✅ 已進入管理模式");
loadData();
}else{
alert("❌ 密碼錯誤");
}
}

async function register(car,pos){
const name=prompt("請輸入姓名");
const phone=prompt("請輸入電話");
if(!name||!phone) return;

await supabaseClient.from("registrations")
.insert([{name,phone,car,position:pos}]);

alert(
`✅ 報名成功！

✨付款銀行✨
轉數快識別碼: 128392362
銀行: 滙豐銀行
戶口姓名: PkmFire Limited

請提供：
✅ 付款截圖
✅ 報名 ${car}
✅ 車位 ${pos}

WhatsApp 發送至:
📲 64866544`
);

loadData();
}

async function deleteRegistration(id){
if(!isAdmin) return;
await supabaseClient.from("registrations").delete().eq("id",id);
loadData();
}

async function loadData(){

const {data}=await supabaseClient.from("registrations").select("*");
let registrations=data||[];

registrations.sort((a,b)=>{
let carA=Number((a.car||"").replace("Car",""))||0;
let carB=Number((b.car||"").replace("Car",""))||0;
if(carA!==carB) return carA-carB;
return (a.position||0)-(b.position||0);
});

const carsDiv=document.getElementById("cars");
const list=document.getElementById("list");
carsDiv.innerHTML="";
list.innerHTML="";

Object.keys(events).forEach(car=>{

const taken=registrations.filter(r=>r.car===car);
const remaining=events[car].slots-taken.length;

const card=document.createElement("div");
card.className="car-card";

card.innerHTML=`
<h2 class="text-yellow-400 text-2xl font-bold mb-3">${car}</h2>
<pre class="whitespace-pre-wrap text-gray-300 mb-4">${events[car].desc}</pre>
${remaining<=0?
`<div class="full">✅ 已滿團</div>`:
`<div class="text-green-400 font-bold mb-3">剩餘名額：${remaining}</div>`}
`;

const grid=document.createElement("div");
grid.className="grid grid-cols-5 gap-3 mt-4";

for(let i=1;i<=events[car].slots;i++){

const btn=document.createElement("button");
btn.innerText=i;

const isTaken=taken.some(r=>Number(r.position)===i);

if(isTaken){
btn.className="slot-btn bg-red-600 text-white cursor-not-allowed";
btn.disabled=true;
}else{
btn.className="slot-btn";
btn.onclick=()=>register(car,i);
}

grid.appendChild(btn);
}

card.appendChild(grid);
carsDiv.appendChild(card);
});

let grouped={};
registrations.forEach(r=>{
if(!grouped[r.car]) grouped[r.car]=[];
grouped[r.car].push(r);
});

Object.keys(grouped).forEach(car=>{
const title=document.createElement("div");
title.className="text-yellow-400 font-bold mt-6";
title.innerText=car;
list.appendChild(title);

grouped[car].forEach(r=>{
const div=document.createElement("div");
div.className="list-card mt-2";

div.innerHTML=`
<div>
位置 ${r.position} - ${r.name} - 📞 ${r.phone}
</div>
${isAdmin?`<div class="delete-btn" onclick="deleteRegistration('${r.id}')">❌</div>`:""}
`;

list.appendChild(div);
});
});

}

loadData();

</script>
</body>
</html>

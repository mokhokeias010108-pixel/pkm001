<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#020617;}

.car-card{
background:linear-gradient(145deg,#0f172a,#0b1220);
border:2px solid gold;
border-radius:20px;
padding:20px;
margin-bottom:30px;
transition:0.3s;
}

/* ✅ PSA 金色閃邊 */
.psa-glow{
box-shadow:0 0 15px gold,0 0 30px #facc15,0 0 45px gold;
border:2px solid #facc15;
}

/* ✅ 100deck 紅色發光 */
.deck-glow{
box-shadow:0 0 15px red,0 0 30px #dc2626,0 0 50px red;
border:2px solid #dc2626;
}

.slot-btn{
background:#374151;
padding:14px;
border-radius:10px;
font-size:18px;
}
.slot-btn:hover{background:#facc15;color:black;}

.full{
background:black;
color:#22c55e;
padding:10px 20px;
border-radius:12px;
box-shadow:0 0 20px red;
font-weight:bold;
}

.list-card{
background:#374151;
padding:14px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete-btn{
color:red;
font-size:22px;
cursor:pointer;
}

.admin-btn{
position:fixed;
top:10px;
right:15px;
background:gold;
color:black;
padding:8px 12px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
z-index:999;
}

.top-info{
background:#111827;
border:2px solid #facc15;
padding:20px;
border-radius:16px;
margin-bottom:30px;
white-space:pre-wrap;
}
</style>
</head>

<body class="text-white">

<div class="admin-btn" onclick="adminLogin()">管理員登入</div>

<div class="p-4 max-w-4xl mx-auto">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-6">
✨✨PkmFire車隊✨✨
</h1>

<div class="top-info text-gray-200">
✨PkmFire車隊福利✨
今日起凡上車皆可進入 PSA 卡抽獎活動
今期獎品：M5 原膜一盒
每車抽一個名額，滿10人抽選
</div>

<div id="cars"></div>

<div class="mt-10 car-card">
<h2 class="text-yellow-400 font-bold text-xl mb-4">📋 已報名名單</h2>
<div id="list" class="space-y-4"></div>
</div>

</div>

<script>

const ADMIN_PASSWORD="$$1234Rmb";
let isAdmin=false;

const supabaseClient = supabase.createClient(
"https://mgcnadtcykoctdwwzpkm.supabase.co",
"sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

const events={

Car1:{
slots:7,
desc:`🛞Car1🛞
🎮玩法
開一盒黃金禮盒混洗
大獎黃金比卡超 x1
二獎金球加配件 x1
參與獎 25周年白卡包代拆 x5
有機會開出生日比卡超、噴火龍
黃金禮盒開出用燈照吾到

🔥 7人成團
🔥 每個位置 $2140`
},

Car2:{
slots:10,
desc:`🛞Car2🛞
✨✨ PSA10人車 ✨✨

🔥 十人成團
🔥 用一盒 M2A 原膜組車
🔥 每人一包 M2A 鬥 AR 編號
🔥 每個位置 $458

🏆 AR編號最大者獲得
✨ 25周年夢夢 PSA10 014/025 ✨`
},

Car3:{
slots:10,
desc:`🛞Car3🛞
✨✨ 100deck原條爭奪戰 ✨✨

🔥 十人成團
🔥 用一盒 M2A 原膜組車
🔥 每人一包 M2A 鬥血量
血量相同補發一包再鬥
🔥 每個位置 $800

🏆 血量最大者獲得
✨ 100deck原條 ✨`
},

Car5:{
slots:10,
desc:`🛞Car5🛞
✨✨ 100deck原條組隊 ✨✨

🔥 十人成團
🔥 每人一盒 100deck（原條開出）
🔥 每個位置 $800`
},

Car4:{
slots:6,
desc:`🛞Car4🛞
✨✨ 超級M2A混能車 ✨✨

六人合開
10張不同AR + 5張MA + 1張SAR/MUR
未達標繼續開

🔥 6人成團
🔥 每個位置 $688
保底每人 9 包`
}

};

function adminLogin(){
const pw=prompt("請輸入管理員密碼");
if(pw===ADMIN_PASSWORD){
isAdmin=true;
alert("✅ 已進入管理模式");
loadData();
}else{
alert("❌ 密碼錯誤");
}
}

async function register(car,pos){
const name=prompt("請輸入姓名");
const phone=prompt("請輸入電話");
if(!name||!phone) return;

await supabaseClient.from("registrations")
.insert([{name,phone,car,position:pos}]);

alert("✅ 報名成功！請完成付款並WhatsApp 64866544 提供付款截圖");
loadData();
}

async function deleteRegistration(id){
if(!isAdmin) return;
await supabaseClient.from("registrations").delete().eq("id",id);
loadData();
}

async function loadData(){

const {data}=await supabaseClient.from("registrations").select("*");
let registrations=data||[];

const carsDiv=document.getElementById("cars");
carsDiv.innerHTML="";

Object.keys(events).forEach(car=>{

const taken=registrations.filter(r=>r.car===car);
const remaining=events[car].slots-taken.length;

const card=document.createElement("div");

/* ✅ 動態發光判斷 */
let extraClass="car-card";

if(car==="Car2"){
extraClass+=" psa-glow";
}

if(car==="Car3"||car==="Car5"){
extraClass+=" deck-glow";
}

card.className=extraClass;

card.innerHTML=`
<h2 class="text-yellow-400 text-2xl font-bold mb-3">${car}</h2>
<pre class="whitespace-pre-wrap text-gray-300 mb-4">${events[car].desc}</pre>
${remaining<=0?
`<div class="full">✅ 已滿團</div>`:
`<div class="text-green-400 font-bold mb-3">剩餘名額：${remaining}</div>`}
`;

const grid=document.createElement("div");
grid.className="grid grid-cols-5 gap-3 mt-4";

for(let i=1;i<=events[car].slots;i++){

const btn=document.createElement("button");
btn.innerText=i;

const isTaken=taken.some(r=>Number(r.position)===i);

if(isTaken){
btn.className="slot-btn bg-red-600 text-white cursor-not-allowed";
btn.disabled=true;
}else{
btn.className="slot-btn";
btn.onclick=()=>register(car,i);
}

grid.appendChild(btn);
}

card.appendChild(grid);
carsDiv.appendChild(card);

});

}

loadData();

</script>
</body>
</html>

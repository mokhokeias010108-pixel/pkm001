<script>
const ADMIN_PASSWORD = "pkmadmin888";
let isAdmin = false;
let selectedCar = null;
let selectedPosition = null;

const { createClient } = supabase;
const supabaseClient = createClient(
  "https://mgcnadtcykoctdwwzpkm.supabase.co",
  "sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

const events = {
  Car1: {
    slots: 7,
    description: `
🎮 開一盒黃金禮盒混洗
黃金比卡超 x1
金球加配件 x1
5包25周年白色卡包代拆
(有機會生日比卡超 / 噴火龍)
🔥 7人成團 | 每位 $2140
`
  },
  Car2: {
    slots: 10,
    description: `
✨ PSA10人車 ✨
每人一包M2A鬥AR編號
🏆 AR最大者獲得
Sv11B黑龍Sar Psa10
🔥 每位 $350
`
  },
  Car3: {
    slots: 6,
    description: `
🎮 超級M2A跑能車
12張AR + 5張MA + 1張SR/SAR/MUR
未達標繼續開
🔥 每位 $700（保底8包）
`
  }
};

function adminLogin() {
  const password = prompt("請輸入管理員密碼：");
  if (password === ADMIN_PASSWORD) {
    isAdmin = true;
    alert("✅ 已進入管理模式");
    loadData();
  }
}

function openModal(car, position) {
  selectedCar = car;
  selectedPosition = position;
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

async function submitModal() {

  const name = document.getElementById("modalName").value;
  const phone = document.getElementById("modalPhone").value;

  if (!name || !phone) {
    alert("請填寫完整資料");
    return;
  }

  const { data: existing } = await supabaseClient
    .from("registrations")
    .select("*")
    .eq("car", selectedCar)
    .eq("position", selectedPosition);

  if (existing.length > 0) {
    alert("此位置已被選擇！");
    closeModal();
    return;
  }

  await supabaseClient.from("registrations").insert([
    { name, phone, car: selectedCar, position: selectedPosition }
  ]);

  closeModal();
  loadData();
}

async function deleteRegistration(car, position) {

  if (!isAdmin) return;

  const confirmDelete = confirm(`確定刪除 ${car} 位置 ${position} 嗎？`);
  if (!confirmDelete) return;

  await supabaseClient
    .from("registrations")
    .delete()
    .eq("car", car)
    .eq("position", position);

  loadData();
}

async function loadData() {

  const { data } = await supabaseClient.from("registrations").select("*");
  const registrations = data || [];

  const container = document.getElementById("cars");
  container.innerHTML = "";

  Object.keys(events).forEach(car => {

    const event = events[car];
    const takenCount = registrations.filter(d => d.car === car).length;
    const remaining = event.slots - takenCount;

    const box = document.createElement("div");
    box.className = "mb-8 bg-gray-900/80 p-5 rounded-xl border border-yellow-500";

    box.innerHTML = `
      <h2 class="text-yellow-400 font-bold text-xl mb-2">${car}</h2>
      <pre class="whitespace-pre-wrap text-sm mb-3 text-gray-300">${event.description}</pre>
      <p class="text-green-400 font-bold mb-3">👇🏻 剩餘名額：${remaining}</p>
    `;

    const grid = document.createElement("div");
    grid.className = "grid grid-cols-5 gap-2";

    for (let i = 1; i <= event.slots; i++) {

      const taken = registrations.find(d => d.car === car && d.position == i);
      const btn = document.createElement("button");
      btn.innerText = i;

      if (taken) {
        btn.className = "bg-red-600 p-2 rounded font-bold";

        if (isAdmin) {
          btn.classList.add("hover:bg-red-800");
          btn.onclick = () => deleteRegistration(car, i);
        }

      } else {
        btn.className = "bg-gray-700 p-2 rounded hover:bg-yellow-500 hover:text-black transition";
        btn.onclick = () => openModal(car, i);
      }

      grid.appendChild(btn);
    }

    box.appendChild(grid);
    container.appendChild(box);
  });

  document.getElementById("list").innerHTML = registrations.map(d => `
    <div class="border-b border-gray-600 py-2">
      ${d.car} - 位置 ${d.position} - ${d.name}
      ${isAdmin ? `<div class="text-xs text-gray-400">電話：${d.phone}</div>` : ""}
    </div>
  `).join("");
}

loadData();
</script>

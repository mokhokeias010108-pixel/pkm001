<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#020617;}
.car-card{
background:linear-gradient(145deg,#0f172a,#0b1220);
border:2px solid gold;
border-radius:20px;
padding:20px;
margin-bottom:30px;
}
.slot-btn{
background:#374151;
padding:14px;
border-radius:10px;
font-size:18px;
}
.slot-btn:hover{background:#facc15;color:black;}
.full{
background:black;
color:#22c55e;
padding:10px 20px;
border-radius:12px;
box-shadow:0 0 20px red;
font-weight:bold;
}
.list-card{
background:#374151;
padding:14px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}
.delete-btn{
color:red;
font-size:22px;
cursor:pointer;
}
</style>
</head>

<body class="text-white">

<div class="p-4 max-w-4xl mx-auto">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-6">
✨✨PkmFire車隊✨✨
</h1>

<div id="cars"></div>

<div class="mt-10 car-card">
<h2 class="text-yellow-400 font-bold text-xl mb-4">📋 已報名名單</h2>
<div id="list" class="space-y-4"></div>
</div>

</div>

<script>

const ADMIN_PASSWORD="pkmadmin888";
let isAdmin=false;

const supabaseClient = supabase.createClient(
"https://mgcnadtcykoctdwwzpkm.supabase.co",
"sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

const events={
Car7:{slots:6,price:270,desc:`Car7 齊齊爆開M5 6人車🛞
🎮-玩法
用兩盒M5原膜組隊
🔥-每人10包
🔥-每人$270`},
Car8:{slots:6,price:270,desc:`Car8 齊齊爆開M5 6人車🛞
🎮-玩法
用兩盒M5原膜組隊
🔥-每人10包
🔥-每人$270`}
};

function adminLogin(){
const pw=prompt("請輸入管理員密碼");
if(pw===ADMIN_PASSWORD){
isAdmin=true;
alert("✅ 管理模式");
loadData();
}
}

async function register(car,pos){
const name=prompt("請輸入姓名");
const phone=prompt("請輸入電話");
if(!name||!phone) return;

await supabaseClient.from("registrations")
.insert([{name,phone,car,position:pos}]);

loadData();
}

async function deleteRegistration(id){
if(!isAdmin) return;
await supabaseClient.from("registrations").delete().eq("id",id);
loadData();
}

async function loadData(){

const {data}=await supabaseClient.from("registrations").select("*");
let registrations=data||[];

/* 排序 */
registrations.sort((a,b)=>{
let carA=Number((a.car||"").replace("Car",""))||0;
let carB=Number((b.car||"").replace("Car",""))||0;
if(carA!==carB) return carA-carB;
return (a.position||0)-(b.position||0);
});

const carsDiv=document.getElementById("cars");
const list=document.getElementById("list");
carsDiv.innerHTML="";
list.innerHTML="";

/* === 上方卡片模式 === */
Object.keys(events).forEach(car=>{

const taken=registrations.filter(r=>r.car===car);
const remaining=events[car].slots-taken.length;

const card=document.createElement("div");
card.className="car-card";

card.innerHTML=`
<h2 class="text-yellow-400 text-2xl font-bold mb-3">${car}</h2>
<pre class="whitespace-pre-wrap text-gray-300 mb-4">${events[car].desc}</pre>
${remaining<=0?
`<div class="full">✅ 已滿團</div>`:
`<div class="text-green-400 font-bold mb-3">剩餘名額：${remaining}</div>`}
`;

const grid=document.createElement("div");
grid.className="grid grid-cols-5 gap-3 mt-4";

for(let i=1;i<=events[car].slots;i++){
const btn=document.createElement("button");
btn.innerText=i;
btn.className="slot-btn";
btn.onclick=()=>register(car,i);
grid.appendChild(btn);
}

card.appendChild(grid);
carsDiv.appendChild(card);
});

/* === 下方名單模式 === */
let grouped={};
registrations.forEach(r=>{
if(!grouped[r.car]) grouped[r.car]=[];
grouped[r.car].push(r);
});

Object.keys(grouped).forEach(car=>{

const title=document.createElement("div");
title.className="text-yellow-400 font-bold mt-6";
title.innerText=car;
list.appendChild(title);

grouped[car].forEach(r=>{
const div=document.createElement("div");
div.className="list-card mt-2";

div.innerHTML=`
<div>
位置 ${r.position} - ${r.name} - 📞 ${r.phone}
</div>
${isAdmin?`<div class="delete-btn" onclick="deleteRegistration('${r.id}')">❌</div>`:""}
`;

list.appendChild(div);
});
});

}

loadData();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@keyframes glow {
  0%,100% { text-shadow: 0 0 10px gold; }
  50% { text-shadow: 0 0 25px orange; }
}
.glow { animation: glow 2s infinite; }

.car-card { transition: all 0.3s ease; }
.car-card:hover {
  box-shadow: 0 0 25px rgba(255,215,0,0.5);
  transform: translateY(-5px);
}

.slot-btn { transition: all 0.2s ease; }
.slot-btn:hover { transform: scale(1.1); }

.full-car {
  animation: pulseGlow 1.5s infinite;
}
@keyframes pulseGlow {
  0% { box-shadow: 0 0 5px red; }
  50% { box-shadow: 0 0 20px red; }
  100% { box-shadow: 0 0 5px red; }
}
</style>
</head>

<body class="text-white min-h-screen bg-gray-950">

<div class="p-4 max-w-4xl mx-auto">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-4 glow">
✨✨PkmFire車隊✨✨
</h1>

<div id="cars"></div>

<div class="mt-10 bg-gray-800 p-5 rounded-xl border border-yellow-500">
  <h2 class="text-yellow-400 font-bold mb-4">📋 已報名名單</h2>
  <div id="list" class="space-y-6 text-sm"></div>
</div>

</div>

<script>

const supabaseClient = supabase.createClient(
  "https://mgcnadtcykoctdwwzpkm.supabase.co",
  "sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

const events = {
  Car1:{ slots:7, price:2140, description:"黃金禮盒車" },
  Car2:{ slots:10, price:690, description:"PSA10車" },
  Car3:{ slots:6, price:700, description:"M2A混能車" },
  Car4:{ slots:6, price:250, description:"M5混洗車" },
  Car5:{ slots:6, price:250, description:"M5混洗車" }
};

async function register(car,pos){

  const name=prompt("請輸入姓名");
  const phone=prompt("請輸入電話");
  if(!name||!phone) return;

  /* ✅ 插入前再次查詢 */
  const {data:check}=await supabaseClient
    .from("registrations")
    .select("*")
    .eq("car",car)
    .eq("position",pos);

  if(check.length>0){
    alert("❌ 此位置已被報名！");
    loadData();
    return;
  }

  /* ✅ 插入資料 */
  const {error}=await supabaseClient
    .from("registrations")
    .insert([{name,phone,car,position:pos}]);

  if(error){
    alert("❌ 報名失敗，可能位置已被搶走！");
    loadData();
    return;
  }

  alert("✅ 報名成功！");
  loadData();
}

async function loadData(){

  const {data}=await supabaseClient.from("registrations").select("*");
  const registrations=data||[];

  const container=document.getElementById("cars");
  const list=document.getElementById("list");
  container.innerHTML="";
  list.innerHTML="";

  /* 分類顯示名單 */
  Object.keys(events).forEach(car=>{

    const carRegs=registrations
      .filter(r=>r.car===car)
      .sort((a,b)=>a.position-b.position);

    if(carRegs.length>0){
      const block=document.createElement("div");
      block.innerHTML=`<h3 class="text-yellow-300 font-bold mb-2">${car}</h3>`;

      carRegs.forEach(r=>{
        const item=document.createElement("div");
        item.className="bg-gray-700 p-2 rounded mb-1";
        item.innerHTML=`位置 ${r.position} - ${r.name}`;
        block.appendChild(item);
      });

      list.appendChild(block);
    }

  });

  /* 畫車位 */
  Object.keys(events).forEach(car=>{

    const taken=registrations.filter(r=>r.car===car);
    const remaining=events[car].slots-taken.length;

    const box=document.createElement("div");
    box.className="mb-8 bg-gray-900 p-5 rounded-xl border border-yellow-500 car-card";

    box.innerHTML=`
      <h2 class="text-yellow-400 font-bold text-xl mb-2">${car}</h2>
      <p class="mb-2">${events[car].description}</p>
      <p class="text-green-400 font-bold">
        ${remaining===0?
          `<span class="full-car px-2 py-1 rounded">✅ 已滿團</span>`
          :
          "剩餘名額："+remaining}
      </p>
    `;

    const grid=document.createElement("div");
    grid.className="grid grid-cols-5 gap-2 mt-3";

    for(let i=1;i<=events[car].slots;i++){
      const takenSlot=registrations.find(r=>r.car===car&&r.position==i);
      const btn=document.createElement("button");
      btn.innerText=i;

      if(takenSlot){
        btn.className="bg-red-600 p-2 rounded font-bold";
      }else{
        btn.className="bg-gray-700 p-2 rounded hover:bg-yellow-500 hover:text-black";
        btn.onclick=()=>register(car,i);
      }

      grid.appendChild(btn);
    }

    box.appendChild(grid);
    container.appendChild(box);
  });

}

loadData();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@keyframes glow {
  0%,100% { text-shadow: 0 0 10px gold; }
  50% { text-shadow: 0 0 25px orange; }
}
.glow { animation: glow 2s infinite; }

.car-card { transition: all 0.3s ease; }
.car-card:hover {
  box-shadow: 0 0 25px rgba(255,215,0,0.5);
  transform: translateY(-5px);
}

.full-car {
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 5px red; }
  50% { box-shadow: 0 0 20px red; }
  100% { box-shadow: 0 0 5px red; }
}

.admin-mode {
  box-shadow: 0 0 40px gold inset;
}
</style>
</head>

<body class="text-white min-h-screen bg-gray-950">

<div class="p-4 max-w-4xl mx-auto">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-4 glow">
✨✨PkmFire車隊✨✨
</h1>

<div class="text-center text-sm text-yellow-300 mb-6">
✨另外為回報大家支持✨<br>
今日起每車上車可參加 PSA 抽獎活動<br>
🎁 今期獎品：M2X 噴火龍 SR PSA10<br>
（每一車抽一個名額，滿10人抽選）
</div>

<div class="text-right mb-4">
<button onclick="adminLogin()" class="text-yellow-400 underline text-sm">
管理員登入
</button>
</div>

<div id="mainPage">
  <div id="cars"></div>

  <div class="mt-10 bg-gray-800 p-5 rounded-xl border border-yellow-500">
    <h2 class="text-yellow-400 font-bold mb-4">📋 已報名名單</h2>
    <div id="list" class="space-y-6 text-sm"></div>
  </div>
</div>

<div id="paymentPage" style="display:none;">
  <div class="bg-gray-900 p-6 rounded-xl border border-yellow-500">
    <h2 class="text-yellow-400 text-xl font-bold mb-4">✅ 報名成功</h2>
    <div id="paymentInfo" class="mb-4"></div>

    <h3 class="text-yellow-400 font-bold mb-2">💰 請完成付款</h3>
    <p>轉數快識別碼：128392362</p>
    <p>銀行：滙豐銀行</p>
    <p>戶口姓名：PkmFire Limited</p>

    <button onclick="sendWhatsApp()" 
      class="mt-6 bg-green-500 text-black px-4 py-2 rounded font-bold w-full">
      ✅ 付款完成 → WhatsApp 通知
    </button>

    <button onclick="goHome()" 
      class="mt-4 bg-yellow-500 text-black px-4 py-2 rounded font-bold w-full">
      返回主頁
    </button>
  </div>
</div>

</div>

<script>

const ADMIN_PASSWORD="pkmadmin888";
let isAdmin=false;
let currentRegistration={};

const supabaseClient = supabase.createClient(
  "https://mgcnadtcykoctdwwzpkm.supabase.co",
  "sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

/* ✅ 更新後車資料 */
const events = {

  Car1:{
    slots:7,
    price:2140,
    description:`🎮-玩法
開一盒黃金禮盒混洗
🏆 大獎 黃金比卡超 x1
🥈 二獎 金球加配件 x1
🎁 5份參與獎 25周年白色卡包
🔥 7人成團
🔥 每個位置 $2140`
  },

  Car2:{
    slots:10,
    price:855,
    description:`✨✨ PSA10人車 ✨✨
🔥 十人成團
🔥 用一盒M2A原膜組車
🔥 每人一包M2A卡包鬥AR編號
🔥 每個位置 $855

🏆 AR編號最大者獲得
✨ 25周年生日比卡超 PSA10 ✨`
  },

  Car3:{
    slots:6,
    price:700,
    description:`🎮-玩法
六人合開：
12張不同AR + 5張MA + 1張SAR/MUR（道具不計）
未夠數繼續開直到達標
🔥 6人成團
🔥 每個位置 $700（保底每人8包）`
  },

  Car4:{
    slots:6,
    price:700,
    description:`🎮-玩法
六人合開：
12張不同AR + 5張MA + 1張SAR/MUR（道具不計）
未夠數繼續開直到達標
🔥 6人成團
🔥 每個位置 $700（保底每人8包）`
  }

};

/* 下面功能完全不變 */

function adminLogin(){
  const pw=prompt("請輸入管理員密碼");
  if(pw===ADMIN_PASSWORD){
    isAdmin=true;
    document.body.classList.add("admin-mode");
    alert("✅ 已進入管理模式");
    loadData();
  }
}

async function deleteRegistration(id){
  if(!confirm("確定刪除？")) return;

  const {error} = await supabaseClient
    .from("registrations")
    .delete()
    .eq("id", id);

  if(error){
    alert("❌ 刪除失敗: " + error.message);
  }else{
    alert("✅ 已刪除");
  }

  loadData();
}

async function register(car,pos){

  const name=prompt("請輸入姓名");
  const phone=prompt("請輸入電話");
  if(!name||!phone) return;

  const {data:check}=await supabaseClient
    .from("registrations")
    .select("*")
    .eq("car",car)
    .eq("position",pos);

  if(check.length>0){
    alert("❌ 此位置已被報名！");
    loadData();
    return;
  }

  await supabaseClient
    .from("registrations")
    .insert([{name,phone,car,position:pos}]);

  currentRegistration={car,pos,name,phone};

  document.getElementById("mainPage").style.display="none";
  document.getElementById("paymentPage").style.display="block";

  document.getElementById("paymentInfo").innerHTML=
    `車輛：${car}<br>位置：${pos}<br>金額：$${events[car].price}`;
}

function sendWhatsApp(){
  const msg=encodeURIComponent(
    `✅ 已完成付款\n姓名:${currentRegistration.name}\n電話:${currentRegistration.phone}\n車輛:${currentRegistration.car}\n位置:${currentRegistration.pos}\n金額:$${events[currentRegistration.car].price}`
  );
  window.open(`https://wa.me/85264866544?text=${msg}`,"_blank");
}

function goHome(){
  document.getElementById("paymentPage").style.display="none";
  document.getElementById("mainPage").style.display="block";
  loadData();
}

async function loadData(){

  const {data}=await supabaseClient.from("registrations").select("*");
  const registrations=data||[];

  const container=document.getElementById("cars");
  const list=document.getElementById("list");
  container.innerHTML="";
  list.innerHTML="";

  Object.keys(events).forEach(car=>{
    const carRegs=registrations
      .filter(r=>r.car===car)
      .sort((a,b)=>a.position-b.position);

    if(carRegs.length>0){
      const block=document.createElement("div");
      block.innerHTML=`<h3 class="text-yellow-300 font-bold mb-2">${car}</h3>`;

      carRegs.forEach(r=>{
        const phoneDisplay=isAdmin ? r.phone : "****"+r.phone.slice(-4);
        const item=document.createElement("div");
        item.className="bg-gray-700 p-2 rounded mb-1 flex justify-between items-center";

        item.innerHTML=`<span>位置 ${r.position} - ${r.name} - 📞 ${phoneDisplay}</span>`;

        if(isAdmin){
          const delBtn=document.createElement("button");
          delBtn.innerText="❌";
          delBtn.className="text-red-400 font-bold";
          delBtn.onclick=()=>deleteRegistration(r.id);
          item.appendChild(delBtn);
        }

        block.appendChild(item);
      });

      list.appendChild(block);
    }
  });

  Object.keys(events).forEach(car=>{
    const taken=registrations.filter(r=>r.car===car);
    const remaining=events[car].slots-taken.length;

    const box=document.createElement("div");
    box.className="mb-8 bg-gray-900 p-5 rounded-xl border border-yellow-500 car-card";

    box.innerHTML=`
      <h2 class="text-yellow-400 font-bold text-xl mb-2">${car}</h2>
      <pre class="whitespace-pre-wrap text-gray-300 mb-3">
${events[car].description}
      </pre>
      <p class="text-green-400 font-bold">
        ${remaining===0?
          `<span class="full-car px-2 py-1 rounded">✅ 已滿團</span>`
          :
          "剩餘名額："+remaining}
      </p>
    `;

    const grid=document.createElement("div");
    grid.className="grid grid-cols-5 gap-2 mt-3";

    for(let i=1;i<=events[car].slots;i++){
      const takenSlot=registrations.find(r=>r.car===car&&r.position==i);
      const btn=document.createElement("button");
      btn.innerText=i;

      if(takenSlot){
        btn.className="bg-red-600 p-2 rounded font-bold";
      }else{
        btn.className="bg-gray-700 p-2 rounded hover:bg-yellow-500 hover:text-black";
        btn.onclick=()=>register(car,i);
      }

      grid.appendChild(btn);
    }

    box.appendChild(grid);
    container.appendChild(box);
  });

}

loadData();

</script>
</body>
</html>

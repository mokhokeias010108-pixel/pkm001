<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>

</head>

<body class="text-white min-h-screen bg-cover bg-center"
style="background-image: url('IMG_8859.jpeg');">

<div class="min-h-screen bg-black/70 backdrop-blur-sm p-4">

<div class="max-w-4xl mx-auto bg-gray-900/80 p-6 rounded-2xl shadow-2xl border border-yellow-500">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-6">
✨✨PkmFire車隊✨✨
</h1>

<div id="cars"></div>

<!-- 付款資訊 -->
<div class="mt-10 bg-gray-800/80 p-5 rounded-xl border border-yellow-500">
<h2 class="text-yellow-400 font-bold mb-3">💰 付款方法</h2>
<p>轉數快識別碼：<span class="text-green-400 font-bold">128392362</span></p>
<p>銀行：滙豐銀行</p>
<p>戶口姓名：PkmFire Limited</p>

<div class="mt-4 border-t border-gray-600 pt-4">
<p>📹 直播時間：5月22號 晚上8點</p>
<p>IG：PkmFire</p>
</div>
</div>

</div>
</div>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://mgcnadtcykoctdwwzpkm.supabase.co",
  "sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

const events = {
  Car1: {
    slots: 7,
    price: "$2140",
    description: `
🛞Car1🛞
🎮 開一盒黃金禮盒混洗
獎品：
黃金比卡超 x1
金球加配件 x1
5包25周年白色卡包代拆
(有機會開出生日比卡超 / 噴火龍)

🔥 7人成團
🔥 每個位置 $2140
💵 人齊先付款
`
  },
  Car2: {
    slots: 10,
    price: "$350",
    description: `
🛞Car2🛞
✨ PSA10人車 ✨

🔥 十人成團
🔥 用一盒M2A原膜組車
🔥 每人一包M2A卡包鬥AR編號
🏆 AR編號最大者獲得
✨ Sv11B黑龍Sar Psa10 ✨

🔥 每個位置 $350
`
  },
  Car3: {
    slots: 6,
    price: "$700",
    description: `
🛞Car3 超級M2A跑能車🛞

🎮 六人開出：
12張不同AR
5張MA
1張 SR/SAR/MUR
(道具不計)

未達標繼續開到達標

🔥 6人成團
🔥 每個位置 $700
💵 保底每人8包
💵 人齊先付款
`
  }
};

async function loadData() {

  const { data } = await supabaseClient
    .from("registrations")
    .select("*");

  const container = document.getElementById("cars");
  container.innerHTML = "";

  Object.keys(events).forEach(car => {

    const event = events[car];
    const takenCount = data.filter(d => d.car === car).length;
    const remaining = event.slots - takenCount;

    const box = document.createElement("div");
    box.className = "mb-8 bg-gray-900/80 p-5 rounded-xl border border-yellow-500";

    box.innerHTML = `
      <h2 class="text-yellow-400 font-bold text-xl mb-3">${car}</h2>
      <pre class="whitespace-pre-wrap text-sm mb-4">${event.description}</pre>
      <p class="text-green-400 font-bold">👇🏻 剩餘名額：${remaining}</p>
    `;

    const grid = document.createElement("div");
    grid.className = "grid grid-cols-5 gap-2 mt-3";

    for (let i = 1; i <= event.slots; i++) {
      const taken = data.find(d => d.car === car && d.position == i);

      const slot = document.createElement("div");
      slot.className = taken
        ? "bg-red-600 text-center p-2 rounded font-bold"
        : "bg-gray-700 text-center p-2 rounded";

      slot.innerText = i;
      grid.appendChild(slot);
    }

    box.appendChild(grid);
    container.appendChild(box);
  });

}

loadData();
</script>

</body>
</html>

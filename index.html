<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@keyframes glow {
  0%,100% { text-shadow: 0 0 10px gold; }
  50% { text-shadow: 0 0 25px orange; }
}
.glow { animation: glow 2s infinite; }
</style>
</head>

<body class="text-white min-h-screen bg-gray-950">

<div class="p-4 max-w-4xl mx-auto">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-6 glow">
✨✨PkmFire車隊✨✨
</h1>

<div id="cars"></div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://mgcnadtcykoctdwwzpkm.supabase.co",
  "sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

const events = {

  Car1: {
    slots: 7,
    description: `
🎮 開一盒黃金禮盒混洗
🔥 7人成團
🔥 每個位置 $2140
`
  },

  Car2: {
    slots: 10,
    description: `
✨ PSA10人車 ✨
🔥 十人成團
🔥 每個位置 $690
`
  },

  Car3: {
    slots: 6,
    description: `
🎮 超級M2A混能車
🔥 6人成團
🔥 每個位置 $700
`
  },

  Car4: {
    slots: 6,
    description: `
🛞 M5混洗車
🔥 6人成團
🔥 每個位置 $280
`
  },

  Car5: {
    slots: 6,
    description: `
🛞 M5混洗車
🔥 6人成團
🔥 每個位置 $280
`
  }

};

async function loadData(){

  const { data } = await supabaseClient
    .from("registrations")
    .select("*");

  const registrations = data || [];
  const container = document.getElementById("cars");
  container.innerHTML = "";

  Object.keys(events).forEach(car => {

    const taken = registrations.filter(r => r.car === car);
    const remaining = events[car].slots - taken.length;

    const box = document.createElement("div");
    box.className = "mb-8 bg-gray-900 p-5 rounded-xl border border-yellow-500";

    box.innerHTML = `
      <h2 class="text-yellow-400 font-bold text-xl mb-2">${car}</h2>
      <pre class="whitespace-pre-wrap text-gray-300 text-sm mb-3">${events[car].description}</pre>
      <p class="text-green-400 font-bold">剩餘名額：${remaining}</p>
    `;

    container.appendChild(box);
  });

}

loadData();
</script>

</body>
</html>

<script>

const ADMIN_PASSWORD="$$1234Rmb";
let isAdmin=false;

const supabaseClient = supabase.createClient(
"https://mgcnadtcykoctdwwzpkm.supabase.co",
"sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

const events={
Car1:{slots:7,desc:`🛞Car1🛞
🔥 7人成團
🔥 每個位置 $2140`},

Car2:{slots:10,desc:`🛞Car2🛞
✨✨ PSA10人車 ✨✨
🔥 十人成團
🔥 每個位置 $458
🏆 AR編號最大者獲得
✨ 25周年夢夢 PSA10 ✨`},

Car3:{slots:10,desc:`🛞Car3🛞
✨✨ 100deck原條爭奪戰 ✨✨
🔥 十人成團
🔥 每個位置 $800
🏆 血量最大者獲得
✨ 100deck原條 ✨`},

Car4:{slots:6,desc:`🛞Car4🛞
✨✨ 超級M2A混能車 ✨✨

六人合開
10張不同AR + 5張MA + 1張SAR/MUR
未達標繼續開

🔥 6人成團
🔥 每個位置 $688
保底每人9包`},

Car5:{slots:10,desc:`🛞Car5🛞
✨✨ 100deck原條組隊 ✨✨
🔥 十人成團
🔥 每個位置 $800`}
};

function adminLogin(){
const pw=prompt("請輸入管理員密碼");
if(pw===ADMIN_PASSWORD){
isAdmin=true;
alert("✅ 已進入管理模式");
loadData();
}else{
alert("❌ 密碼錯誤");
}
}

async function register(car,pos){
const name=prompt("請輸入姓名");
const phone=prompt("請輸入電話");
if(!name||!phone) return;

await supabaseClient.from("registrations")
.insert([{name,phone,car,position:pos}]);

alert("✅ 報名成功！");
loadData();
}

async function deleteRegistration(id){
await supabaseClient.from("registrations")
.delete()
.eq("id",id);

loadData();
}

async function loadData(){

const {data}=await supabaseClient.from("registrations").select("*");
let registrations=data||[];

registrations.sort((a,b)=>{
let carA=Number((a.car||"").replace("Car",""))||0;
let carB=Number((b.car||"").replace("Car",""))||0;
if(carA!==carB) return carA-carB;
return (a.position||0)-(b.position||0);
});

const carsDiv=document.getElementById("cars");
const listDiv=document.getElementById("list");

carsDiv.innerHTML="";
listDiv.innerHTML="";

["Car1","Car2","Car3","Car4","Car5"].forEach(car=>{

const taken=registrations.filter(r=>r.car===car);
const remaining=events[car].slots-taken.length;

const card=document.createElement("div");

let extra="car-card";
if(car==="Car2") extra+=" psa-glow";
if(car==="Car4") extra+=" gold-breath";
if(car==="Car3"||car==="Car5") extra+=" red-pulse";

card.className=extra;

card.innerHTML=`
<h2 class="text-yellow-400 text-2xl font-bold mb-3">${car}</h2>
<pre class="whitespace-pre-wrap text-gray-300 mb-4">${events[car].desc}</pre>
${remaining<=0?
`<div class="full">✅ 已滿團</div>`:
`<div class="text-green-400 font-bold mb-3">剩餘名額：${remaining}</div>`}
`;

const grid=document.createElement("div");
grid.className="grid grid-cols-5 gap-3 mt-4";

for(let i=1;i<=events[car].slots;i++){
const btn=document.createElement("button");
btn.innerText=i;

const isTaken=taken.some(r=>Number(r.position)===i);

if(isTaken){
btn.className="slot-btn bg-red-600 text-white cursor-not-allowed";
btn.disabled=true;
}else{
btn.className="slot-btn";
btn.onclick=()=>register(car,i);
}

grid.appendChild(btn);
}

card.appendChild(grid);
carsDiv.appendChild(card);

/* ✅ 名單顯示 */
taken.forEach(r=>{
const item=document.createElement("div");
item.className="list-card";

const info=document.createElement("div");
info.innerHTML=`
${r.car} - ${r.position}號位<br>
${r.name} (${r.phone})
`;

item.appendChild(info);

/* ✅ 管理員才顯示刪除 */
if(isAdmin){
const del=document.createElement("div");
del.className="delete-btn";
del.innerText="✖";
del.addEventListener("click",()=>{
if(confirm("確定刪除？")){
deleteRegistration(r.id);
}
});
item.appendChild(del);
}

listDiv.appendChild(item);
});

});

}

loadData();

</script>

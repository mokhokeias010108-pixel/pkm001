<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#0b1220;}
.car-title{color:#facc15;font-size:20px;font-weight:bold;margin-top:30px;}
.slot-card{
background:#374151;
padding:14px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}
.delete-btn{
color:red;
font-size:20px;
cursor:pointer;
}
</style>
</head>

<body class="text-white min-h-screen">

<div class="p-4 max-w-3xl mx-auto">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-4">
✨✨PkmFire車隊✨✨
</h1>

<div class="text-center text-red-400 font-bold mb-2">
🔥 直播時間：5月27日 晚上10:30
</div>

<div class="text-center text-yellow-300 mb-6">
📹 直播平台：IG_pkmfire_
</div>

<div class="text-right mb-4">
<button onclick="adminLogin()" class="text-yellow-400 underline text-sm">
管理員登入
</button>
</div>

<div id="mainPage">
<div id="cars"></div>

<div class="mt-10 bg-gray-800 p-5 rounded-xl border border-yellow-500">
<h2 class="text-yellow-400 font-bold mb-4">📋 已報名名單</h2>
<div id="list" class="space-y-6 text-sm"></div>
</div>
</div>

</div>

<script>

const ADMIN_PASSWORD="pkmadmin888";
let isAdmin=false;

const supabaseClient = supabase.createClient(
"https://mgcnadtcykoctdwwzpkm.supabase.co",
"sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

function adminLogin(){
const pw=prompt("請輸入管理員密碼");
if(pw===ADMIN_PASSWORD){
isAdmin=true;
alert("✅ 已進入管理模式");
loadData();
}
}

async function deleteRegistration(id){
if(!isAdmin) return;
await supabaseClient.from("registrations").delete().eq("id",id);
loadData();
}

async function loadData(){

const {data,error}=await supabaseClient
.from("registrations")
.select("*");

if(error){
console.log(error);
return;
}

let registrations=data||[];

/* ✅ 排序 */
registrations.sort(function(a,b){
let carA=Number((a.car||"").replace("Car",""))||0;
let carB=Number((b.car||"").replace("Car",""))||0;
if(carA!==carB) return carA-carB;
return (a.position||0)-(b.position||0);
});

const list=document.getElementById("list");
list.innerHTML="";

/* ✅ 分車顯示 */
let grouped={};

registrations.forEach(r=>{
if(!grouped[r.car]) grouped[r.car]=[];
grouped[r.car].push(r);
});

Object.keys(grouped).forEach(car=>{

const title=document.createElement("div");
title.className="car-title";
title.innerText=car;
list.appendChild(title);

grouped[car].forEach(r=>{
const div=document.createElement("div");
div.className="slot-card mt-3";

div.innerHTML=`
<div>
位置 ${r.position} - ${r.name} - 📞 ${r.phone}
</div>
${isAdmin?`<div class="delete-btn" onclick="deleteRegistration('${r.id}')">❌</div>`:""}
`;

list.appendChild(div);
});

});

}

loadData();

</script>
</body>
</html>

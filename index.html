<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@keyframes glow {
  0%,100% { text-shadow: 0 0 10px gold; }
  50% { text-shadow: 0 0 25px orange; }
}
.glow { animation: glow 2s infinite; }
</style>
</head>

<body class="text-white min-h-screen bg-gray-950">

<div class="p-4 max-w-4xl mx-auto">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-6 glow">
✨✨PkmFire車隊✨✨
</h1>

<div id="cars"></div>

<!-- ✅ 付款方法 -->
<div class="mt-10 bg-gray-800 p-5 rounded-xl border border-yellow-500">
<h2 class="text-yellow-400 font-bold mb-3">💰 付款方法</h2>
<p>轉數快識別碼：128392362</p>
<p>銀行：滙豐銀行</p>
<p>戶口姓名：PkmFire Limited</p>
</div>

<!-- ✅ 已報名名單 -->
<div class="mt-10 bg-gray-800 p-5 rounded-xl border border-yellow-500">
<h2 class="text-yellow-400 font-bold mb-3">📋 已報名名單</h2>
<div id="list"></div>
</div>

</div>

<script>

const supabaseClient = supabase.createClient(
  "https://mgcnadtcykoctdwwzpkm.supabase.co",
  "sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

const events = {

  Car1: {
    slots: 7,
    price: 2140,
    description: `
🎮 玩法：
開一盒黃金禮盒混洗

🏆 大獎：黃金比卡超 x1
🥈 二獎：金球加配件 x1
🎁 參與獎：5包25周年白色卡包代拆（每人一包）

✨ 有機會開出生日比卡超 / 噴火龍
❗ 黃金禮盒開出用燈照唔到

🔥 7人成團
🔥 每個位置 $2140
`
  },

  Car2: {
    slots: 10,
    price: 690,
    description: `
✨✨ PSA10人車 ✨✨

🔥 十人成團
🔥 用一盒 M2A 原膜組車
🔥 每人一包 M2A 卡包鬥 AR 編號
🔥 每個位置 $690

🏆 AR 編號最大者獲得：
✨ 滑浪比卡超 Promo PSA10 ✨
`
  },

  Car3: {
    slots: 6,
    price: 700,
    description: `
🎮 超級M2A混能車

玩法：
六人合共開出
✅ 12張不同 AR
✅ 5張 MA
✅ 1張 SR / SAR / MUR
（道具不計）

達標先停車
未達標繼續開到夠數為止

🔥 6人成團
🔥 每個位置 $700
（保底每人 8 包）
`
  },

  Car4: {
    slots: 6,
    price: 280,
    description: `
🛞 M5混洗車

🔥 6人成團
🔥 用兩盒 M5 組車
🔥 每人 10 包
🔥 每個位置 $280
`
  },

  Car5: {
    slots: 6,
    price: 280,
    description: `
🛞 M5混洗車

🔥 6人成團
🔥 用兩盒 M5 組車
🔥 每人 10 包
🔥 每個位置 $280
`
  }

};

async function register(car, position){

  const name = prompt("請輸入姓名");
  const phone = prompt("請輸入電話");
  if(!name || !phone) return;

  await supabaseClient.from("registrations").insert([
    { name, phone, car, position }
  ]);

  loadData();
}

async function loadData(){

  const { data } = await supabaseClient
    .from("registrations")
    .select("*");

  const registrations = data || [];
  const container = document.getElementById("cars");
  container.innerHTML = "";

  Object.keys(events).forEach(car=>{

    const taken = registrations.filter(r=>r.car===car);
    const remaining = events[car].slots - taken.length;

    const box = document.createElement("div");
    box.className="mb-10 bg-gray-900 p-5 rounded-xl border border-yellow-500";

    box.innerHTML=`
      <h2 class="text-yellow-400 text-xl font-bold mb-3">${car}</h2>
      <pre class="whitespace-pre-wrap text-gray-300 mb-3">${events[car].description}</pre>
      <p class="text-green-400 font-bold">剩餘名額：${remaining}</p>
    `;

    const grid=document.createElement("div");
    grid.className="grid grid-cols-5 gap-2 mt-4";

    for(let i=1;i<=events[car].slots;i++){

      const takenSlot=registrations.find(r=>r.car===car && r.position==i);
      const btn=document.createElement("button");

      btn.innerText=i;

      if(takenSlot){
        btn.className="bg-red-600 p-2 rounded font-bold";
      }else{
        btn.className="bg-gray-700 p-2 rounded hover:bg-yellow-500 hover:text-black";
        btn.onclick=()=>register(car,i);
      }

      grid.appendChild(btn);
    }

    box.appendChild(grid);
    container.appendChild(box);

  });

  // ✅ 分類名單
  const list=document.getElementById("list");
  list.innerHTML="";

  Object.keys(events).forEach(car=>{

    const carRegs=registrations
      .filter(r=>r.car===car)
      .sort((a,b)=>a.position-b.position);

    if(carRegs.length===0) return;

    const section=document.createElement("div");
    section.className="mb-4";

    section.innerHTML=`<h3 class="text-yellow-400 font-bold">${car}</h3>`;

    carRegs.forEach(r=>{
      const row=document.createElement("div");
      row.innerText=`位置 ${r.position} - ${r.name}`;
      section.appendChild(row);
    });

    list.appendChild(section);

  });

}

loadData();

</script>

</body>
</html>

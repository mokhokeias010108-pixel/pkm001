<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFireи»ҠйҡҠ</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@keyframes glow {
  0%,100% { text-shadow: 0 0 10px gold; }
  50% { text-shadow: 0 0 25px orange; }
}
.glow { animation: glow 2s infinite; }

.car-card { transition: all 0.3s ease; }
.car-card:hover {
  box-shadow: 0 0 25px rgba(255,215,0,0.5);
  transform: translateY(-5px);
}

.full-car { animation: pulse 1.5s infinite; }
@keyframes pulse {
  0% { box-shadow: 0 0 5px red; }
  50% { box-shadow: 0 0 20px red; }
  100% { box-shadow: 0 0 5px red; }
}

.admin-mode { box-shadow: 0 0 40px gold inset; }
</style>
</head>

<body class="text-white min-h-screen bg-gray-950">

<div class="p-4 max-w-4xl mx-auto">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-4 glow">
вңЁвңЁPkmFireи»ҠйҡҠвңЁвңЁ
</h1>

<div class="text-right mb-4">
<button onclick="adminLogin()" class="text-yellow-400 underline text-sm">
з®ЎзҗҶе“Ўзҷ»е…Ҙ
</button>
</div>

<div id="mainPage">
  <div id="cars"></div>

  <div class="mt-10 bg-gray-800 p-5 rounded-xl border border-yellow-500">
    <h2 class="text-yellow-400 font-bold mb-4">рҹ“Ӣ е·Іе ұеҗҚеҗҚе–®</h2>
    <div id="list" class="space-y-3 text-sm"></div>
  </div>
</div>

</div>

<script>

const ADMIN_PASSWORD="pkmadmin888";
let isAdmin=false;

const supabaseClient = supabase.createClient(
  "https://mgcnadtcykoctdwwzpkm.supabase.co",
  "sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

const events = {
Car1:{slots:7,price:2140,description:`рҹ”Ҙ 7дәәжҲҗеңҳ\nрҹ”Ҙ жҜҸеҖӢдҪҚзҪ® $2140`},
Car2:{slots:10,price:530,description:`рҹ”Ҙ еҚҒдәәжҲҗеңҳ\nрҹ”Ҙ жҜҸеҖӢдҪҚзҪ® $530`},
Car3:{slots:6,price:668,description:`рҹ”Ҙ 6дәәжҲҗеңҳ\nрҹ”Ҙ жҜҸеҖӢдҪҚзҪ® $668`},
Car4:{slots:6,price:270,description:`рҹ”Ҙ жҜҸдәә10еҢ…\nрҹ”Ҙ жҜҸдәә$270`},
Car5:{slots:6,price:270,description:`рҹ”Ҙ жҜҸдәә10еҢ…\nрҹ”Ҙ жҜҸдәә$270`},
Car6:{slots:6,price:270,description:`рҹ”Ҙ жҜҸдәә10еҢ…\nрҹ”Ҙ жҜҸдәә$270`},
Car7:{slots:6,price:270,description:`рҹ”Ҙ жҜҸдәә10еҢ…\nрҹ”Ҙ жҜҸдәә$270`},
Car8:{slots:6,price:270,description:`рҹ”Ҙ жҜҸдәә10еҢ…\nрҹ”Ҙ жҜҸдәә$270`}
};

function adminLogin(){
const pw=prompt("и«Ӣијёе…Ҙз®ЎзҗҶе“ЎеҜҶзўј");
if(pw===ADMIN_PASSWORD){
isAdmin=true;
document.body.classList.add("admin-mode");
alert("вң… е·ІйҖІе…Ҙз®ЎзҗҶжЁЎејҸ");
loadData();
}
}

async function register(car,pos){

const name=prompt("и«Ӣијёе…Ҙе§“еҗҚ");
const phone=prompt("и«Ӣијёе…Ҙйӣ»и©ұ");
if(!name||!phone) return;

await supabaseClient.from("registrations")
.insert([{name,phone,car,position:pos}]);

alert("вң… е ұеҗҚжҲҗеҠҹ");
loadData();
}

async function deleteUser(id){
await supabaseClient.from("registrations").delete().eq("id",id);
loadData();
}

async function loadData(){

const {data}=await supabaseClient
.from("registrations")
.select("*");

const registrations=data||[];

const container=document.getElementById("cars");
const list=document.getElementById("list");

container.innerHTML="";
list.innerHTML="";

Object.keys(events).forEach(car=>{

const taken=registrations.filter(r=>r.car===car);

const box=document.createElement("div");
box.className="mb-8 bg-gray-900 p-5 rounded-xl border border-yellow-500 car-card";

box.innerHTML=`
<h2 class="text-yellow-400 font-bold text-xl mb-2">${car}</h2>
<pre class="whitespace-pre-wrap text-gray-300 mb-3">${events[car].description}</pre>
<p class="text-green-400 font-bold">
еү©йӨҳеҗҚйЎҚпјҡ${events[car].slots - taken.length}
</p>`;

const grid=document.createElement("div");
grid.className="grid grid-cols-5 gap-2 mt-3";

for(let i=1;i<=events[car].slots;i++){

const occupied=taken.find(r=>r.position===i);

const btn=document.createElement("button");
btn.innerText=i;

if(occupied){
btn.className="bg-red-600 p-2 rounded text-white";
btn.disabled=true;
}else{
btn.className="bg-gray-700 p-2 rounded hover:bg-yellow-500 hover:text-black";
btn.onclick=()=>register(car,i);
}

grid.appendChild(btn);
}

box.appendChild(grid);
container.appendChild(box);
});

// вң… еҗҚе–®йЎҜзӨә
registrations.forEach(r=>{
const div=document.createElement("div");
div.className="bg-gray-700 p-2 rounded flex justify-between";

div.innerHTML=`
<span>${r.car} - дҪҚзҪ® ${r.position} - ${r.name} (${r.phone})</span>
${isAdmin?`<button onclick="deleteUser(${r.id})" class="text-red-400">еҲӘйҷӨ</button>`:""}
`;

list.appendChild(div);
});

}

loadData();

</script>
</body>
</html>

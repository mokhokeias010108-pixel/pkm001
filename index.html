<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>

<style>
@keyframes glow {
  0%,100% { text-shadow: 0 0 10px gold; }
  50% { text-shadow: 0 0 25px orange; }
}
.glow {
  animation: glow 2s infinite;
}
</style>

</head>

<body class="text-white min-h-screen bg-cover bg-center"
style="background-image: url('IMG_8859.jpeg');">

<div class="min-h-screen bg-black/70 backdrop-blur-sm p-4">

<div class="max-w-4xl mx-auto bg-gray-900/90 p-6 rounded-2xl shadow-2xl border border-yellow-500">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-6 glow">
✨✨PkmFire車隊✨✨
</h1>

<div class="text-right mb-4">
<button onclick="adminLogin()" class="text-sm text-yellow-400 underline">
管理員登入
</button>
</div>

<div id="cars"></div>

<!-- 付款資訊 -->
<div class="mt-10 bg-gray-800/80 p-5 rounded-xl border border-yellow-500">
<h2 class="text-yellow-400 font-bold mb-3">💰 付款方法</h2>
<p>轉數快識別碼：<span class="text-green-400 font-bold">128392362</span></p>
<p>銀行：滙豐銀行</p>
<p>戶口姓名：PkmFire Limited</p>
<div class="mt-4 border-t border-gray-600 pt-4">
<p>📹 直播時間：5月22號 晚上8點</p>
<p>IG：PkmFire</p>
</div>
</div>

<div class="mt-10 bg-gray-800/80 p-5 rounded-xl border border-yellow-500">
<h2 class="text-yellow-400 font-bold mb-3">📋 已報名名單</h2>
<div id="list"></div>
</div>

</div>
</div>

<!-- 彈窗 -->
<div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center">
  <div class="bg-gray-900 p-6 rounded-xl w-80 border border-yellow-500">
    <h2 class="text-yellow-400 font-bold mb-4">報名資料</h2>
    <input id="modalName" placeholder="姓名" class="w-full mb-3 p-2 rounded bg-gray-700">
    <input id="modalPhone" placeholder="電話" class="w-full mb-4 p-2 rounded bg-gray-700">
    <div class="flex justify-between">
      <button onclick="closeModal()" class="bg-gray-600 px-3 py-1 rounded">取消</button>
      <button onclick="submitModal()" class="bg-yellow-500 text-black px-3 py-1 rounded font-bold">提交</button>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = "pkmadmin888";
let isAdmin = false;
let selectedCar = null;
let selectedPosition = null;

const { createClient } = supabase;

const supabaseClient = createClient(
  "https://mgcnadtcykoctdwwzpkm.supabase.co",
  "sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

const events = {
  Car1: { slots: 7 },
  Car2: { slots: 10 },
  Car3: { slots: 6 }
};

function adminLogin() {
  const password = prompt("請輸入管理員密碼：");
  if (password === ADMIN_PASSWORD) {
    isAdmin = true;
    alert("已進入管理模式");
    loadData();
  }
}

function openModal(car, position) {
  selectedCar = car;
  selectedPosition = position;
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

async function submitModal() {

  const name = document.getElementById("modalName").value;
  const phone = document.getElementById("modalPhone").value;

  if (!name || !phone) {
    alert("請填寫完整資料");
    return;
  }

  const { data: existing } = await supabaseClient
    .from("registrations")
    .select("*")
    .eq("car", selectedCar)
    .eq("position", selectedPosition);

  if (existing.length > 0) {
    alert("此位置已被選擇！");
    closeModal();
    return;
  }

  await supabaseClient.from("registrations").insert([
    { name, phone, car: selectedCar, position: selectedPosition }
  ]);

  closeModal();
  loadData();
}

async function loadData() {

  const { data } = await supabaseClient.from("registrations").select("*");
  const registrations = data || [];

  const container = document.getElementById("cars");
  container.innerHTML = "";

  Object.keys(events).forEach(car => {

    const event = events[car];
    const takenCount = registrations.filter(d => d.car === car).length;
    const remaining = event.slots - takenCount;

    const box = document.createElement("div");
    box.className = "mb-8 bg-gray-900/80 p-5 rounded-xl border border-yellow-500";

    box.innerHTML = `
      <h2 class="text-yellow-400 font-bold text-xl mb-3">${car}</h2>
      <p class="text-green-400 font-bold mb-3">👇🏻 剩餘名額：${remaining}</p>
    `;

    const grid = document.createElement("div");
    grid.className = "grid grid-cols-5 gap-2";

    for (let i = 1; i <= event.slots; i++) {

      const taken = registrations.find(d => d.car === car && d.position == i);

      const btn = document.createElement("button");
      btn.innerText = i;

      if (taken) {
        btn.className = "bg-red-600 p-2 rounded font-bold";
      } else {
        btn.className = "bg-gray-700 p-2 rounded hover:bg-yellow-500 hover:text-black transition";
        btn.onclick = () => openModal(car, i);
      }

      grid.appendChild(btn);
    }

    box.appendChild(grid);
    container.appendChild(box);
  });

  document.getElementById("list").innerHTML = registrations.map(d => `
    <div class="border-b border-gray-600 py-2">
      ${d.car} - 位置 ${d.position} - ${d.name}
      ${isAdmin ? `<div class="text-xs text-gray-400">電話：${d.phone}</div>` : ""}
    </div>
  `).join("");
}

loadData();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>

<style>
@keyframes glow {
  0%,100% { text-shadow: 0 0 10px gold; }
  50% { text-shadow: 0 0 25px orange; }
}
.glow { animation: glow 2s infinite; }
</style>
</head>

<body class="text-white min-h-screen bg-gray-950">

<div class="p-4 max-w-4xl mx-auto">

<h1 class="text-3xl font-bold text-center text-yellow-400 mb-6 glow">
✨✨PkmFire車隊✨✨
</h1>

<div class="text-right mb-4">
<button onclick="adminLogin()" class="text-sm text-yellow-400 underline">
管理員登入
</button>
</div>

<div id="cars"></div>

<!-- 付款方法 -->
<div class="mt-10 bg-gray-800 p-5 rounded-xl border border-yellow-500">
<h2 class="text-yellow-400 font-bold mb-3">💰 付款方法</h2>
<p>轉數快識別碼：<span class="text-green-400 font-bold">128392362</span></p>
<p>銀行：滙豐銀行</p>
<p>戶口姓名：PkmFire Limited</p>
</div>

<!-- 直播時間 -->
<div class="mt-6 bg-gray-800 p-5 rounded-xl border border-yellow-500">
<h2 class="text-yellow-400 font-bold mb-3">📹 直播時間</h2>
<p>5月22號 晚上8點</p>
<p>IG：PkmFire</p>
</div>

<!-- 已報名名單 -->
<div class="mt-10 bg-gray-800 p-5 rounded-xl border border-yellow-500">
<h2 class="text-yellow-400 font-bold mb-3">📋 已報名名單</h2>
<div id="list"></div>
</div>

</div>

<script>
const ADMIN_PASSWORD = "pkmadmin888";
let isAdmin = false;

const supabaseClient = supabase.createClient(
  "https://mgcnadtcykoctdwwzpkm.supabase.co",
  "sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

const events = {

  Car1: {
    slots: 7,
    description: `
🎮 開一盒黃金禮盒混洗
黃金比卡超 x1
金球加配件 x1
5包25周年白色卡包代拆
(有機會生日比卡超 / 噴火龍)
🔥 7人成團 | 每位 $2140
`
  },

  Car2: {
    slots: 10,
    description: `
✨ PSA10人車 ✨
每人一包M2A鬥AR編號
🏆 AR最大者獲得
Sv11B黑龍Sar Psa10
🔥 每位 $350
`
  },

  Car3: {
    slots: 6,
    description: `
🎮 超級M2A跑能車
12張AR + 5張MA + 1張SR/SAR/MUR
未達標繼續開
🔥 每位 $700（保底8包）
`
  },

  Car4: {
    slots: 6,
    description: `
🛞 M5混洗車
🔥 6人成團
🔥 用一盒M5組車
🔥 每人5包
🔥 每個位置 $145
`
  }

};

function adminLogin(){
  const pw = prompt("輸入管理員密碼");
  if(pw === ADMIN_PASSWORD){
    isAdmin = true;
    alert("✅ 已進入管理模式");
    setTimeout(loadData, 100);
  }
}

async function deleteRegistration(car, position){
  if(!isAdmin) return;
  if(!confirm(`刪除 ${car} 位置 ${position}?`)) return;

  await supabaseClient
    .from("registrations")
    .delete()
    .eq("car", car)
    .eq("position", position);

  loadData();
}

async function register(car, position){
  const name = prompt("姓名");
  const phone = prompt("電話");
  if(!name || !phone) return;

  const { data: existing } = await supabaseClient
    .from("registrations")
    .select("*")
    .eq("car", car)
    .eq("position", position);

  if(existing.length > 0){
    alert("此位置已被選擇！");
    return;
  }

  await supabaseClient.from("registrations").insert([
    { name, phone, car, position }
  ]);

  loadData();
}

async function loadData(){

  try{
    const { data } = await supabaseClient
      .from("registrations")
      .select("*");

    const registrations = data || [];
    const container = document.getElementById("cars");
    container.innerHTML = "";

    // ✅ 建立車顯示
    Object.keys(events).forEach(car => {

      const taken = registrations.filter(r => r.car === car);
      const remaining = events[car].slots - taken.length;

      const box = document.createElement("div");
      box.className = "mb-8 bg-gray-900 p-5 rounded-xl border border-yellow-500";

      box.innerHTML = `
        <h2 class="text-yellow-400 font-bold text-xl mb-2">${car}</h2>
        <pre class="whitespace-pre-wrap text-gray-300 text-sm mb-3">${events[car].description}</pre>
        <p class="text-green-400 font-bold mb-3">👇🏻 剩餘名額：${remaining}</p>
      `;

      const grid = document.createElement("div");
      grid.className = "grid grid-cols-5 gap-2";

      for(let i=1;i<=events[car].slots;i++){

        const takenSlot = registrations.find(r=>r.car===car && r.position==i);

        const btn = document.createElement("button");
        btn.innerText = i;

        if(takenSlot){
          btn.className = "bg-red-600 p-2 rounded font-bold";
          if(isAdmin){
            btn.onclick = ()=>deleteRegistration(car,i);
          }
        }else{
          btn.className = "bg-gray-700 p-2 rounded hover:bg-yellow-500 hover:text-black";
          btn.onclick = ()=>register(car,i);
        }

        grid.appendChild(btn);
      }

      box.appendChild(grid);
      container.appendChild(box);
    });

    // ✅ 分類顯示報名名單
    const listContainer = document.getElementById("list");
    listContainer.innerHTML = "";

    Object.keys(events).forEach(car => {

      const carRegs = registrations
        .filter(r => r.car === car)
        .sort((a,b)=>a.position - b.position);

      if(carRegs.length === 0) return;

      const carBox = document.createElement("div");
      carBox.className = "mb-6";

      carBox.innerHTML = `
        <h3 class="text-yellow-400 font-bold mb-2">${car}</h3>
      `;

      carRegs.forEach(r => {

        const row = document.createElement("div");
        row.className = "border-b border-gray-700 py-2";

        row.innerHTML = `
          位置 ${r.position} - ${r.name}
          ${isAdmin && r.phone ? `
            <div class="text-xs text-green-400 font-bold">
              📞 電話：${r.phone}
            </div>
          ` : ""}
        `;

        carBox.appendChild(row);
      });

      listContainer.appendChild(carBox);
    });

  }catch(e){
    console.error("系統錯誤:", e);
  }
}

loadData();
</script>

</body>
</html>

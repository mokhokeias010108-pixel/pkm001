<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PkmFire車隊</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gray-950 text-white min-h-screen">

<div class="max-w-4xl mx-auto p-4">

<h1 class="text-3xl text-yellow-400 font-bold text-center mb-6">
✨✨ PkmFire車隊 ✨✨
</h1>

<div id="cars" class="space-y-6"></div>

<div class="mt-10 bg-gray-900 p-6 rounded-xl border border-yellow-500">
<h2 class="text-yellow-400 font-bold mb-4">📋 已報名名單</h2>
<div id="list" class="space-y-3 text-sm"></div>
</div>

</div>

<script>

// ✅ 確認 project 正確
const supabaseClient = supabase.createClient(
  "https://mgcnadtcykoctdwwzpkm.supabase.co",
  "sb_publishable_MacSDHq4cHmkIDxDucl7kw_UqbaojcN"
);

// ✅ 車資料
const events = {
Car1:{slots:6,price:270},
Car2:{slots:6,price:270},
Car3:{slots:6,price:270},
Car4:{slots:6,price:270},
Car5:{slots:6,price:270},
Car6:{slots:6,price:270},
Car7:{slots:6,price:270},
Car8:{slots:6,price:270}
};

async function loadData(){

const { data, error } = await supabaseClient
.from("registrations")
.select("*")
.order("id",{ascending:true});

console.log("DATA:",data);
console.log("ERROR:",error);

if(error){
alert("❌ 讀取失敗："+error.message);
return;
}

const registrations = data || [];

const carContainer = document.getElementById("cars");
const listContainer = document.getElementById("list");

carContainer.innerHTML="";
listContainer.innerHTML="";

// ✅ 顯示車輛
Object.keys(events).forEach(car=>{

const taken = registrations.filter(r=>r.car===car);
const remaining = events[car].slots - taken.length;

const box = document.createElement("div");
box.className="bg-gray-900 p-5 rounded-xl border border-yellow-500";

box.innerHTML=`
<h2 class="text-yellow-400 font-bold text-xl mb-2">${car}</h2>
<p class="text-green-400">
${remaining<=0 ? "✅ 已滿團" : "剩餘名額："+remaining}
</p>
`;

carContainer.appendChild(box);
});

// ✅ 顯示報名名單
registrations.forEach(r=>{
const div=document.createElement("div");
div.className="bg-gray-800 p-3 rounded";
div.innerHTML=`${r.car} - 位置 ${r.position} - ${r.name} (${r.phone})`;
listContainer.appendChild(div);
});

}

loadData();

</script>

</body>
</html>
